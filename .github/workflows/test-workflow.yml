on:
  push: # Occurs as part of the release pipeline, or equivalently, as part of the run_integ_test.sh script ran by the CICD bot
    branches:
      - integ-tests
  workflow_call: # Occurs when called by a topic branch upon pull-request approval
    inputs:
        branch-name:
            required: true
            type: string

name: Integration Test

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Sanity check
      run: echo "Sanity check"

    - name: Print current build ID
      # Only relevant if this workflow is a step of the release pipeline
      if: github.event.name == 'push'
      run: |
        echo Integration test run: githubactionsamazonecsdeplo-NWcjHIgDJLXw:8500e78f-34dc-404f-a2bd-afddbe5f0139
    
    - name: Dummy job
      if: github.event.name == 'workflow_call'
      id: dummy
      run: |
        echo "An acknowledgement message with branch name ${{ inputs.branch-name }}"


